<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 80" width="280" height="80">
  <!-- Option B: Brain + Forge Spark Hybrid — abstrakter, verspielter -->
  <defs>
    <linearGradient id="brainGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"  stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#4338CA"/>
    </linearGradient>
    <linearGradient id="sparkGrad" x1="50%" y1="100%" x2="50%" y2="0%">
      <stop offset="0%"  stop-color="#FF4B4B"/>
      <stop offset="100%" stop-color="#FFD700"/>
    </linearGradient>
  </defs>

  <!-- Abstrakter Kopf-/Brain-Umriss mit Funken -->
  <g transform="translate(10, 10)">
    <!-- Kopf-Outline (3/4 Profil, stilisiert) -->
    <path d="M 30 10
             C 14 10, 6 22, 6 36
             C 6 50, 16 60, 30 60
             L 38 60
             L 38 50
             L 46 50
             L 46 42
             L 50 38
             L 46 34
             L 46 24
             C 46 16, 40 10, 30 10 Z"
          fill="url(#brainGrad)" stroke="none"/>
    <!-- Innerer "Spark" -->
    <path d="M 24 28
             L 28 24
             L 32 30
             L 36 22
             L 34 32
             L 38 30
             L 30 40
             L 28 36
             L 22 38 Z"
          fill="url(#sparkGrad)"/>
    <!-- Aufsteigende Sparks -->
    <circle cx="52" cy="6" r="3" fill="#FF8800"/>
    <circle cx="58" cy="14" r="2" fill="#FFD700" opacity="0.85"/>
    <circle cx="55" cy="22" r="1.5" fill="#FF4B4B" opacity="0.7"/>
  </g>

  <!-- Wordmark -->
  <text x="80" y="48"
        font-family="-apple-system, 'Inter', 'Segoe UI', sans-serif"
        font-size="28" font-weight="700" fill="#0E1117"
        letter-spacing="-0.7">MindForge</text>
  <text x="80" y="64"
        font-family="-apple-system, 'Inter', 'Segoe UI', sans-serif"
        font-size="11" font-weight="500" fill="#6B7280"
        letter-spacing="1.2">COACH ADMIN</text>
</svg>

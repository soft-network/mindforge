             Q 26 33 28 37
             Q 28 30 34 25
             Q 36 30 35 35
             Q 38 32 40 38
             Q 42 30 38 22
             Q 36 25 32 18 Z"
          fill="url(#flameGrad)"/>
    <circle cx="50" cy="6" r="2.5" fill="#FFD700" opacity="0.9"/>
    <circle cx="56" cy="10" r="1.5" fill="#FFA500" opacity="0.7"/>
  </g>
</svg>

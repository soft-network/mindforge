[theme]
# Primary-Accent: warmes Orange — passt zum 🔥-MindForge-Logo. Wird für
# Buttons, Slider-Tracks, aktive Tabs und Links verwendet.
primaryColor             = "#f97316"
# Hauptflächen: hell neutral, leicht kühl — Charts bleiben farbecht.
backgroundColor          = "#ffffff"
# Side-Panels / Container — minimal abgesetzt vom Hauptbereich.
secondaryBackgroundColor = "#f1f5f9"
textColor                = "#111827"
font                     = "sans serif"

[server]
headless = true
port = 8501
enableCORS = false
enableXsrfProtection = true
maxUploadSize = 5

[browser]
gatherUsageStats = false

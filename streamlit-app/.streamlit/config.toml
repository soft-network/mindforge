[theme]
# Primary-Accent: Lovelifepassport-Rot. Wird für Buttons, Slider-Tracks,
# aktive Page-Links, Tabs und Marken-Icons verwendet.
primaryColor             = "#FF4B4B"
backgroundColor          = "#FFFFFF"
secondaryBackgroundColor = "#F0F2F6"
textColor                = "#262730"
font                     = "sans serif"

[server]
headless = true
port = 8501
enableCORS = false
enableXsrfProtection = true
maxUploadSize = 5

[browser]
gatherUsageStats = false
